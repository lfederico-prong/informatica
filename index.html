    <title>Portafolio</title>

    <style>
        body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f4f8;
        margin: 0;
        padding: 0;
        color: #333333;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        }
        header {
        background-color: #1e293b;
        color: #ffffff;
        text-align: center;
        padding: 20px;
        }
        nav {
        background-color: #334155;
        text-align: center;
        padding: 10px;
        }
        nav a {
        color: #ffffff;
        text-decoration: none;
        padding: 8px 16px;
        display: inline-block;
        }
        nav a:hover {
        background-color: #0ea5e9;
        border-radius: 4px;
        }
        main{
        display:flex;
        flex: 1;
        }
        aside {
        width: 25%;
        background-color: #ffffff;
        padding: 20px;
        box-sizing: border-box;
        }
        aside h3 {
        color: #1e293b;
        border-bottom: 2px solid #0ea5e9;
        padding-bottom: 5px;
        }
        aside ul {
        list-style-type: none;
        padding: 0;
        }
        aside li {
        margin: 12px 0;
        }
        aside a {
        color: #475569;
        text-decoration: none;
        display: inline-block;
        padding: 6px;
        }
        aside a:hover {
        background-color: #f1f5f9;
        color: #0ea5e9;
        padding-left: 12px;
        }
        section {
        width: 75%;
        padding: 20px;
        box-sizing: border-box;
        }
        iframe {
        width: 100%;
        height: 100%;
        border: 2px solid #334155;
        background-color: #ffffff;
        }
        footer {
        background-color: #1e293b;
        color: #ffffff;
        text-align: center;
        padding: 15px;
        }
        footer span {
        color: #0ea5e9;
        font-weight: bold;
        }
        </style>

</head>
